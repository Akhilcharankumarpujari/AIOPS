apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-frontend
  namespace: default
  labels:
    app: aiops-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aiops-frontend
  template:
    metadata:
      labels:
        app: aiops-frontend
    spec:
      containers:
      - name: frontend
        image: aiops-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        env:
        - name: NEXT_PUBLIC_API_URL
          valueFrom:
            configMapKeyRef:
              name: aiops-frontend-config
              key: api-url
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
